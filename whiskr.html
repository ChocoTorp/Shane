<style>
  :root {
    /* Type scale (1920×1080) */
    --type-mega: 150px;
    --type-display: 96px;
    --type-title: 70px;
    --type-subtitle: 40px;
    --type-body: 31px;
    --type-small: 25px;
    --type-eyebrow: 24px;
    --type-cite: 24px;

    /* Spacing */
    --pad-x: 120px;
    --pad-y: 92px;
    --gap-title: 34px;

    /* Color */
    --bg: #0c0c0e;
    --panel: #16161b;
    --ink: #f2f0ec;
    --muted: #8c8c93;
    --faint: #5a5a61;
    --line: rgba(255, 255, 255, 0.13);
    --accent: #e5372b;
    --accent-soft: rgba(229, 55, 43, 0.16);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    font-family: "Archivo", system-ui, sans-serif;
  }

  deck-stage:not(:defined) { visibility: hidden; }

  section {
    background: var(--bg);
    color: var(--ink);
    overflow: hidden;
  }
  /* ===== premise: population estimate + 3D globe ===== */
  section[data-label="The Premise"] { overflow: visible; }
  section[data-label="The Premise"] .eyebrow { position: relative; z-index: 2; }
  section[data-label="The Premise"] .cite,
  section[data-label="The Premise"] .folio { z-index: 2; }
  .premise-mount { flex: 1; display: flex; margin-top: 6px; }
  .pm { flex: 1; position: relative; display: block; }
  .pm-left { position: relative; z-index: 2; max-width: 600px; padding-top: 36px; }
  .pm-title { font-size: 58px; font-weight: 800; line-height: 1.02; letter-spacing: -0.022em; margin: 0; max-width: 15ch; }
  .pm-caveat { font-size: 25px; color: var(--muted); line-height: 1.4; margin: 22px 0 0; max-width: 38ch; }
  .pm-controls { display: flex; align-items: center; gap: 40px; margin: 32px 0 30px; flex-wrap: wrap; }
  .pm-rate { display: flex; align-items: center; gap: 16px; }
  .pm-rate input[type="range"] { width: 220px; accent-color: var(--accent); cursor: pointer; }
  .pm-rate .rv { font-size: 26px; font-weight: 800; color: var(--ink); min-width: 4ch; }
  .pm-figure { display: flex; align-items: center; gap: 26px; }
  .pm-big { font-size: 120px; font-weight: 900; line-height: 0.86; letter-spacing: -0.04em; color: var(--accent); }
  .pm-big-cap { font-size: 24px; color: var(--muted); max-width: 16ch; line-height: 1.3; }
  .pm-sub { display: flex; gap: 50px; margin-top: 30px; }
  .pm-stat .n { font-size: 46px; font-weight: 800; color: var(--ink); letter-spacing: -0.02em; }
  .pm-stat .l { font-size: 21px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; margin-top: 4px; }
  .pm-globe-wrap { position: absolute; z-index: 1; top: 50%; left: 64%; transform: translate(-50%, -50%); width: 1800px; height: 1800px; pointer-events: none; }
  .pm-globe { position: absolute; inset: 0; pointer-events: auto; }
  .pm-canvas { position: absolute; inset: 0; cursor: grab; touch-action: none; }
  .pm-canvas canvas { display: block; touch-action: none; }
  .pm-label { position: absolute; left: 0; top: 0; transform: translate(-50%, -100%); pointer-events: none; opacity: 0; transition: opacity .25s; will-change: left, top; }
  .pm-label .box { background: var(--accent); color: var(--ink); padding: 8px 14px; font-size: 21px; font-weight: 800; white-space: nowrap; line-height: 1.15; display: flex; flex-direction: column; letter-spacing: 0.02em; }
  .pm-label .box span { font-weight: 600; font-size: 15px; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.9; margin-top: 2px; }
  .pm-label .stem { width: 2px; height: 22px; background: var(--accent); margin: 0 auto; }
  .pm-label .dot { width: 13px; height: 13px; border-radius: 50%; background: #fff; box-shadow: 0 0 0 6px rgba(229,55,43,0.30); margin: -6px auto 0; }
  .pm-label.sub .box { background: #ff8a3b; color: #1b0f06; padding: 6px 11px; font-size: 15px; }
  .pm-label.sub .box span { font-size: 11px; }
  .pm-label.sub .stem { height: 16px; background: #ff8a3b; }
  .pm-label.sub .dot { width: 10px; height: 10px; box-shadow: 0 0 0 4px rgba(255,138,59,0.35); margin: -5px auto 0; }
  .pm-cities { display: flex; flex-direction: column; margin-top: 28px; border-top: 1px solid var(--line); max-width: 32ch; }
  .pm-city { display: grid; grid-template-columns: 44px 1fr auto; align-items: baseline; gap: 16px; padding: 13px 0; border-bottom: 1px solid var(--line); }
  .pm-city .rk { color: var(--accent); font-weight: 800; font-size: 23px; }
  .pm-city .cn { font-size: 27px; font-weight: 600; color: var(--ink); }
  .pm-city .cv { font-size: 22px; color: var(--muted); font-weight: 600; white-space: nowrap; }
  .pm-zoom { margin-top: 28px; display: inline-flex; align-items: center; gap: 14px; background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 16px 26px; font-family: inherit; font-size: 25px; font-weight: 700; letter-spacing: 0.03em; cursor: pointer; transition: background .15s, color .15s; }
  .pm-zoom .ic { font-size: 20px; }
  .pm-zoom.on { background: var(--accent); color: var(--ink); }
  .pm-rotate-btn {
    position: absolute; bottom: 28%; left: 50%; transform: translateX(-50%); z-index: 5; pointer-events: auto;
    display: inline-flex; align-items: center; gap: 10px;
    background: rgba(15,15,18,0.82); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(229,55,43,0.55); color: var(--accent);
    padding: 10px 16px; font-family: inherit; font-size: 16px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; cursor: pointer; transition: background .15s, border-color .15s, color .15s;
  }
  .pm-rotate-btn:hover { background: rgba(229,55,43,0.18); }
  .pm-rotate-btn.off { border-color: rgba(255,255,255,0.30); color: var(--muted); }
  .pm-rotate-btn .ic { font-size: 14px; }
  .pm-legend {
    margin-top: 22px;

  /* ============ standalone furry-globe page ============ */

  /* 1920x1080 design stage, scaled to fit the viewport (same idea as the deck). */

  #stage .pm-globe-wrap {

  #stage .pm-title,

  #stage .pm-left {

  .pm-popup {

  /* ---- W.H.I.S.K.R. wordmark (looks like the running software) ---- */
  .whiskr-logo {
    position: fixed; top: 0; left: 0; right: 0; width: 100%; box-sizing: border-box;

    .whiskr-logo .wk-dot, .whiskr-logo .wk-cursor { animation: none; }
  }

  /* ---- music: play button in the dock (right); volume slides out the top when playing ---- */
  .deck-audio {
    position: fixed; bottom: 16px; right: 22px; top: auto; left: auto; z-index: 82;
    display: flex; flex-direction: column-reverse; align-items: center; gap: 0;
    padding: 0; background: none; border: 0; box-shadow: none;

  }
  @keyframes da-pop {
    from { opacity: 0; transform: scale(0.7) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .deck-audio .da-toggle {
    position: relative; z-index: 2; flex: none;
    width: 56px; height: 56px; border-radius: 0 2px 2px 0; border: 1px solid var(--line);
    cursor: pointer; background: rgba(255, 255, 255, 0.04); color: var(--accent);
    display: flex; align-items: center; justify-content: center; padding: 0;
    box-shadow: none;
    transition: background 140ms ease, color 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
  }
  .deck-audio .da-toggle:hover { background: rgba(229, 55, 43, 0.12); border-color: rgba(229, 55, 43, 0.5); }
  .deck-audio .da-toggle:active { background: rgba(229, 55, 43, 0.2); }
  .deck-audio .da-toggle svg { width: 20px; height: 20px; display: block; }
  .deck-audio .da-toggle .da-pause { display: none; }
  .deck-audio.is-playing .da-toggle .da-play { display: none; }
  .deck-audio.is-playing .da-toggle .da-pause { display: block; }
  /* Playing = engaged (solid red), matching the rotate toggle's ON state. */
  .deck-audio.is-playing .da-toggle {
    background: var(--accent); color: var(--ink); border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 0 18px rgba(229, 55, 43, 0.45);
  }
  .deck-audio .da-meta { display: none; }
  /* Volume: hidden when paused; when playing it grows up out of the button, same width (56px). */
  .deck-audio .da-vol { display: none; }
  .deck-audio.is-playing .da-vol {
    display: block; z-index: 1;
    -webkit-appearance: none; appearance: none;
    writing-mode: vertical-lr; direction: rtl;
    width: 56px; height: 128px; box-sizing: border-box;
    margin-bottom: -24px; padding: 12px 0 26px;
    border: 1px solid var(--line); border-bottom: 0; border-radius: 2px 2px 0 0;
    background: linear-gradient(var(--faint), var(--faint)) center 12px / 4px calc(100% - 44px) no-repeat,

    cursor: pointer; outline: none;
    animation: da-vol-pop 200ms ease both;
  }
  @keyframes da-vol-pop { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .deck-audio .da-vol::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;

    background: var(--accent); border: 2px solid var(--ink);

  .deck-audio .da-vol::-webkit-slider-thumb:hover { transform: scale(1.08); }
  .deck-audio .da-vol::-moz-range-thumb { width: 40px; height: 10px; border-radius: 6px; background: var(--accent); border: 2px solid var(--ink); }
  @media (prefers-reduced-motion: reduce) { .deck-audio, .deck-audio.is-playing .da-vol { animation: none; } }

  /* ---- phone tuning ---- */

<script type="text/babel">
  function PremisePanel() {
    const { useState, useRef, useEffect } = React;
    // Subscribe to global risk tick so the Shane gauge updates every 3s.
    const [, _bumpRisk] = useState(0);
    useEffect(() => {
      const h = () => _bumpRisk((x) => x + 1);
      window.addEventListener('risk-tick', h);
      return () => window.removeEventListener('risk-tick', h);
    }, []);
    const [zoom, setZoom] = useState(false);
    const [autoRotate, setAutoRotate] = useState(true);
    const [hoverInfo, setHoverInfo] = useState(null);
    const [clicked, setClicked] = useState(null);
    const [cardOffset, setCardOffset] = useState({ x: 0, y: 0 });
    const [dragging2, setDragging2] = useState(false);
    const cardOffsetRef = useRef({ x: 0, y: 0 });
    useEffect(() => { cardOffsetRef.current = cardOffset; }, [cardOffset]);
    // Fetch preview whenever a new furry target is clicked (keep card position)
    useEffect(() => {
      if (!clicked || clicked.kind !== 'furry' || clicked.imgUrl !== undefined) return;
      let cancelled = false;
      const id = clicked.id;
      const apply = (img, title, desc) => {
        if (cancelled) return;
        setClicked((c) => (c && c.id === id ? { ...c, imgUrl: img || null, title: title, desc: desc } : c));
      };
      // 1) Same-origin serverless proxy — works on Vercel (no 3rd-party CORS gating).
      const viaApi = () =>
        fetch('/api/furtrack?id=' + id)
          .then((r) => (r.ok ? r.json() : Promise.reject()))
          .then((d) => { if (!d || !d.img) return Promise.reject(); apply(d.img, d.title, d.desc); });
      // 2) Fallback: public CORS proxies — for local/static use where /api isn't available.
      const target = 'https://fxfurtrack.com/p/' + id;
      const proxies = [
        (u) => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
        (u) => 'https://corsproxy.io/?url=' + encodeURIComponent(u),
        (u) => 'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(u),
        (u) => 'https://cors.eu.org/' + u,
      ];
      const parse = (html) => {
        const img = (html.match(/property="og:image"\s+content="([^"]+)"/) || [])[1] || null;
        const title = (html.match(/property="og:title"\s+content="([^"]+)"/) || [])[1] || null;
        const desc = (html.match(/property="og:description"\s+content="([^"]+)"/) || [])[1] || null;
        if (!img) throw new Error('no og:image');
        return { img, title, desc };
      };
      const viaProxies = () =>
        Promise.any(proxies.map((p) =>
          fetch(p(target)).then((r) => (r.ok ? r.text() : Promise.reject())).then(parse)
        )).then((d) => apply(d.img, d.title, d.desc));

      viaApi().catch(() => viaProxies()).catch(() => apply(null));
      return () => { cancelled = true; };

<script>
  // Shared soundtrack — one <audio>, a single draggable control pinned top-right.
  // Auto-plays (falling back to the first user gesture if the browser blocks it).
  (function () {
    var PLAY  = '<svg class="da-play" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>';
    var PAUSE = '<svg class="da-pause" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>';

    var audio = document.getElementById('deckAudio');
    if (!audio) return;
    audio.volume = 0.7;

    var box = document.createElement('div');
    box.className = 'deck-audio';
    box.innerHTML =
      '<button class="da-toggle" type="button" aria-label="Play soundtrack">' + PLAY + PAUSE + '</button>' +
      '<div class="da-meta"><span class="da-track">Flooded City</span><span class="da-artist">Jeremy Cullen</span></div>' +
      '<input class="da-vol" type="range" min="0" max="1" step="0.01" value="0.7" aria-label="Volume">';
    (document.getElementById('stage') || document.body).appendChild(box);

    var toggle = box.querySelector('.da-toggle');
    var vol = box.querySelector('.da-vol');

    toggle.addEventListener('click', function () {
      if (audio.paused) { audio.play().catch(function () {}); }
      else { audio.pause(); }
    });
    vol.addEventListener('input', function () { audio.volume = parseFloat(vol.value); });

    function syncPlay() {
      var playing = !audio.paused && !audio.ended;
      box.classList.toggle('is-playing', playing);
      toggle.setAttribute('aria-label', playing ? 'Pause soundtrack' : 'Play soundtrack');
    }
    function syncVol() { if (parseFloat(vol.value) !== audio.volume) vol.value = audio.volume; }
    audio.addEventListener('play', syncPlay);
    audio.addEventListener('pause', syncPlay);
    audio.addEventListener('ended', syncPlay);
    audio.addEventListener('volumechange', syncVol);

    // Drag the pill anywhere in the viewport (ignoring the button + slider).
    var dragging = false, sx = 0, sy = 0, bl = 0, bt = 0;
    box.addEventListener('pointerdown', function (e) {
      if (e.target.closest('.da-toggle, .da-vol')) return;
      dragging = true; box.classList.add('dragging');
      var r = box.getBoundingClientRect();
      bl = r.left; bt = r.top; sx = e.clientX; sy = e.clientY;
      box.style.right = 'auto'; box.style.bottom = 'auto';
      box.style.left = bl + 'px'; box.style.top = bt + 'px';
      try { box.setPointerCapture(e.pointerId); } catch (_) {}
      e.preventDefault();
    });
    box.addEventListener('pointermove', function (e) {
      if (!dragging) return;
      var nl = bl + (e.clientX - sx), nt = bt + (e.clientY - sy);
      nl = Math.max(0, Math.min(window.innerWidth - box.offsetWidth, nl));
      nt = Math.max(0, Math.min(window.innerHeight - box.offsetHeight, nt));
      box.style.left = nl + 'px'; box.style.top = nt + 'px';
    });
    function end(e) {
      if (!dragging) return;
      dragging = false; box.classList.remove('dragging');
      try { box.releasePointerCapture(e.pointerId); } catch (_) {}
    }
    box.addEventListener('pointerup', end);
    box.addEventListener('pointercancel', end);

    // Auto-play; if blocked, start on the first interaction anywhere.
    var p = audio.play();
    if (p && p.catch) {
      p.catch(function () {
        var evs = ['pointerdown', 'keydown', 'touchstart'];
        var once = function () {
          audio.play().catch(function () {});
          evs.forEach(function (ev) { window.removeEventListener(ev, once, true); });
        };
        evs.forEach(function (ev) { window.addEventListener(ev, once, true); });
      });
    }

    // Mute when the tab loses focus; resume if it was playing when you return.
    var wasPlaying = false;
    document.addEventListener('visibilitychange', function () {
      if (document.hidden) {
        wasPlaying = !audio.paused;
        audio.pause();
      } else if (wasPlaying) {
        audio.play().catch(function () {});
      }
    });

    syncPlay(); syncVol();
  })();
</script>
